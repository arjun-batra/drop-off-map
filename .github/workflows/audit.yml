name: Audit

on:
  push:
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks (secrets scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect project type
        id: detect
        run: |
          if [ -f pyproject.toml ] || [ -f setup.py ] || [ -f requirements.txt ]; then
            echo "python=true" >> "$GITHUB_OUTPUT"
          fi
          if [ -f package.json ]; then
            echo "node=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.detect.outputs.python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Ruff lint (if configured)
        if: steps.detect.outputs.python == 'true'
        run: |
          if [ -f ruff.toml ] || [ -f .ruff.toml ] || (grep -q "\[tool.ruff\]" pyproject.toml 2>/dev/null); then
            pip install ruff
            ruff check .
          else
            echo "No ruff config found, skipping lint."
          fi

      - name: Python tests (if present)
        if: steps.detect.outputs.python == 'true'
        run: |
          if [ -d tests ]; then
            pip install -r requirements.txt 2>/dev/null || pip install -e . 2>/dev/null || true
            pip install pytest
            pytest -q --tb=short
          else
            echo "No tests/ directory found, skipping tests."
          fi

      - name: Set up Node
        if: steps.detect.outputs.node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ESLint (if configured)
        if: steps.detect.outputs.node == 'true'
        run: |
          if [ -f .eslintrc.json ] || [ -f .eslintrc.js ] || [ -f .eslintrc.cjs ] || [ -f eslint.config.js ] || [ -f eslint.config.mjs ]; then
            npm ci
            npx eslint .
          else
            echo "No eslint config found, skipping lint."
          fi

      - name: Node tests (if present)
        if: steps.detect.outputs.node == 'true'
        run: |
          if [ -d tests ] || [ -d test ] || [ -d __tests__ ]; then
            npm ci
            npm test --if-present
          else
            echo "No test directory found, skipping tests."
          fi
